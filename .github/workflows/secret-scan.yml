name: secret-scan
on:
  workflow_call:
   workflow_dispatch:
jobs:
  secret-scan: 
    runs-on: ubuntu-latest
    steps:
     - name: Checkout Code
       uses: actions/checkout@v4
       with:
        fetch-depth: 0
     - name: run gitleaks scanner
       uses: gitleaks/gitleaks-action@v2
       env:
         GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}   
     