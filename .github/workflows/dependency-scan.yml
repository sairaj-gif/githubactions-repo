
#packages-issues vulnablity scan
#pip-audit

name: dependency-scan
on: 
  workflow_call:
  workflow_dispatch:
jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: set up python
        uses: actions/setup-python@v5
        with:
         python-version: "3.12"
      - name: install pip Audut
        run: pip install pip-audit
      - name: audit dependencies
        run: pip-audit -r requirements.txt