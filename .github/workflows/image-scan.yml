name: image-scan
on:
  workflow_call:
  workflow_dispatch:
jobs:
  image-scanner:
    runs-on: ubuntu-latest
    steps:
       - name: Log in to Docker Hub
         uses: docker/login-action@v3
         with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
       - name: trivy image scan
         uses: aquasecurity/trivy-action@v0.33.1
         with:
          severity: 'CRITICAL'
          exit-code: '1'   