name: CICD

on:
  workflow_dispatch:

jobs:

  #  1. CODE (Checkout)
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

  #  2. BUILD
  build:
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: Build step
        run: echo "Docker container build"

  #  3. TEST
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test step
        run: echo "Test completed successfully"

  #  4. DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy step
        run: echo "Deploy completed successfully"
